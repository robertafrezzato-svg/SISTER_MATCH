<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sister Match — Il gioco di Sister Act il Musical</title>
<meta property="og:title" content="Sister Match — Il gioco di Sister Act il Musical">
<meta property="og:description" content="Allinea, canta, vinci i biglietti per l'anteprima dell'8 ottobre!">

<meta property="og:type" content="website">

<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#d8232a;--red-deep:#8a0e14;--gold:#f4c842;--gold-deep:#b8891f;
  --cream:#fff5e1;--ink:#0a0a0a;--ink-soft:#1c1c1c;
  --halo:rgba(244,200,66,0.4);
  --font-display:'Lobster',cursive;--font-impact:'Bowlby One SC',sans-serif;
  --font-body:'Manrope',sans-serif;
}
html,body{width:100%;height:100%;overflow-x:hidden;background:var(--ink);color:var(--cream);font-family:var(--font-body)}
body{display:flex;justify-content:center;align-items:flex-start}
#app{width:100%;max-width:480px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;background:linear-gradient(180deg,#1a0a0a 0%,var(--ink) 40%);overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,0.5)}
body::before{content:'';position:fixed;inset:0;background:var(--ink);z-index:0}
#app{position:relative;z-index:1}

/* ===== CURSOR ===== */
button,a,[role="button"]{cursor:pointer}

/* ===== TOPBAR ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,0.4);z-index:10;flex-shrink:0}
.topbar-pill{font-family:var(--font-impact);font-size:12px;background:var(--gold);color:var(--ink);padding:4px 10px;border-radius:20px;letter-spacing:0.5px}
.topbar-title{font-family:var(--font-display);font-size:20px;color:var(--cream);display:flex;align-items:center;gap:6px}
.topbar-logo{height:52px;object-fit:contain}
.topbar-btns{display:flex;gap:8px}
.topbar-btns button{background:none;border:2px solid var(--cream);color:var(--cream);font-size:18px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.topbar-btns button.muted{opacity:0.5;border-color:rgba(255,255,255,0.3)}

/* ===== HUD ===== */
.hud{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:rgba(0,0,0,0.25);flex-shrink:0;min-height:48px}
.hud-objectives{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.obj-item{font-size:14px;font-weight:600;display:flex;align-items:center;gap:2px}
.obj-item.done{color:var(--gold);animation:objPulse 0.5s ease}
.obj-item .obj-sym{font-size:18px}
.hud-moves{font-family:var(--font-impact);font-size:28px;color:var(--gold);text-align:center;min-width:50px}

/* ===== BOSS HUD ===== */
.boss-hud{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(0,0,0,0.35);flex-shrink:0}
.boss-icon{font-size:24px}
.boss-bar-wrap{flex:1;height:14px;background:var(--ink-soft);border-radius:7px;overflow:hidden;border:1px solid var(--gold-deep)}
.boss-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-deep));transition:width 0.3s ease;border-radius:7px}
.boss-label{font-size:11px;font-family:var(--font-impact);color:var(--gold)}

/* ===== GRID ===== */
.grid-wrap{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:2px 4px 0;position:relative;overflow:hidden}
.grid-container{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;width:100%;aspect-ratio:7/8;touch-action:none;user-select:none;-webkit-user-select:none;position:relative}
.grid-cell{aspect-ratio:1;background:rgba(255,255,255,0.06);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,5.5vw,36px);transition:transform 0.15s ease,opacity 0.2s ease;position:relative}
.grid-cell.selected{transform:scale(1.15);box-shadow:0 0 0 3px var(--gold);z-index:2}
.grid-cell.hint{animation:hintPulse 0.6s ease infinite}
.grid-cell.matched{animation:matchPop 0.45s ease forwards;background:var(--gold);border-radius:50%}
.grid-cell.falling{transition:transform 0.25s ease-in}
.grid-cell.swapping{transition:transform 0.2s ease}
.grid-cell.invalid-swap{animation:invalidShake 0.3s ease}
.boss-overlay{position:absolute;inset:0;background:rgba(80,0,60,0.15);pointer-events:none;z-index:1;border-radius:12px}
.boss-border{position:absolute;inset:0;border:3px solid transparent;border-radius:12px;pointer-events:none;z-index:1;transition:border-color 0.5s ease}

/* ===== FOOTER ===== */
.footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:6px 0 4px;text-align:center;z-index:5;pointer-events:none;background:linear-gradient(transparent,rgba(0,0,0,0.7) 30%);opacity:0;transition:opacity 0.5s ease}
.footer.visible{opacity:1}
.footer img{width:100%;max-height:100px;height:auto;object-fit:cover;object-position:center;display:block;pointer-events:auto}

/* ===== OVERLAY BASE ===== */
.overlay{position:fixed;top:0;bottom:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,10,0.98);text-align:center;padding:24px;transition:opacity 0.4s ease;max-width:480px;left:50%;transform:translateX(-50%);width:100%}
.overlay.hidden{opacity:0;pointer-events:none}

/* ===== INTRO OVERLAY ===== */
#introOverlay{justify-content:flex-start;padding:0;overflow-y:auto}
#introOverlay .intro-photo{width:100%;height:auto;max-height:75vh;object-fit:cover;object-position:center top;border-radius:0 0 16px 16px;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.6));flex-shrink:0}
#introOverlay .intro-bottom{display:flex;flex-direction:column;align-items:center;padding:24px 24px 32px;flex-shrink:0}
#introOverlay .preview-objs{display:flex;gap:12px;justify-content:center;margin-bottom:24px;font-size:22px;font-weight:600;flex-wrap:wrap}
#introOverlay .resume-row{display:flex;gap:12px;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 32px;border:none;border-radius:12px;font-family:var(--font-impact);font-size:16px;letter-spacing:0.5px;transition:transform 0.15s ease,box-shadow 0.15s ease}
.btn:active{transform:scale(0.96)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:var(--ink);box-shadow:0 4px 16px var(--halo)}
.btn-outline{background:transparent;border:2px solid var(--cream);color:var(--cream);font-size:14px;padding:10px 20px}
.btn-red{background:linear-gradient(135deg,var(--red),var(--red-deep));color:var(--cream)}

/* ===== CUTSCENE OVERLAY ===== */
#cutsceneOverlay .act-label{font-family:var(--font-impact);font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:8px}
#cutsceneOverlay .cut-emoji{font-size:48px;margin-bottom:8px}
#cutsceneOverlay .cut-title{font-family:var(--font-display);font-size:clamp(28px,8vw,42px);color:var(--cream);margin-bottom:12px}
#cutsceneOverlay .cut-text{font-family:var(--font-body);font-size:16px;font-style:italic;color:rgba(255,245,225,0.8);max-width:340px;margin-bottom:24px;line-height:1.5}

/* ===== END OVERLAY ===== */
#endOverlay .end-title{font-family:var(--font-display);font-size:clamp(32px,10vw,52px);margin-bottom:8px}
#endOverlay .end-sub{font-family:var(--font-body);font-size:16px;margin-bottom:6px}
#endOverlay .end-stars{font-size:32px;margin-bottom:12px}
#endOverlay .end-score{font-family:var(--font-impact);font-size:24px;color:var(--gold);margin-bottom:20px}
#endOverlay .end-btns{display:flex;flex-direction:column;gap:10px;align-items:center}

/* ===== PRIZE OVERLAY ===== */
#prizeOverlay{background:linear-gradient(180deg,rgba(10,10,10,0.97),rgba(30,10,10,0.98))}
#prizeOverlay .logo-vert{max-width:55vw;max-height:22vh;margin-bottom:12px}
#prizeOverlay .logo-fallback{font-family:var(--font-display);font-size:clamp(48px,14vw,80px);color:var(--red);text-shadow:4px 4px 0 var(--cream),8px 8px 0 var(--ink);transform:rotate(-5deg);line-height:0.85;margin-bottom:12px}
#prizeOverlay .prize-congrats{font-family:var(--font-display);font-size:clamp(36px,10vw,56px);color:var(--red);-webkit-text-stroke:2px var(--cream);margin-bottom:4px}
#prizeOverlay .prize-sub{font-family:var(--font-impact);font-size:18px;color:var(--gold);margin-bottom:16px}
#prizeOverlay .prize-text{font-family:var(--font-body);font-size:17px;line-height:1.5;max-width:340px;color:var(--cream);margin-bottom:24px}
#prizeOverlay .prize-btns{display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:300px}
.confetti{position:absolute;width:8px;height:12px;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none;z-index:101}

/* ===== TUTORIAL OVERLAY ===== */
#tutorialOverlay{position:fixed;top:0;bottom:0;z-index:110;display:flex;flex-direction:column;align-items:center;justify-content:center;background:transparent;pointer-events:none;max-width:480px;left:50%;transform:translateX(-50%);width:100%}
#tutorialOverlay .tut-hand{font-size:48px;animation:tutSwipe 1.5s ease infinite}
#tutorialOverlay .tut-text{font-family:var(--font-impact);font-size:18px;color:var(--gold);margin-top:12px;text-shadow:0 2px 8px rgba(0,0,0,0.9),0 0 20px rgba(0,0,0,0.7);-webkit-text-stroke:0.5px var(--ink)}

/* ===== COMBO TOAST ===== */
#comboToast{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:90;font-family:var(--font-display);font-size:clamp(36px,10vw,56px);color:var(--red);text-shadow:3px 3px 0 var(--gold),6px 6px 0 var(--ink);pointer-events:none;opacity:0;transition:none}
#comboToast.show{animation:comboIn 1s ease forwards}

/* ===== BOSS TOAST ===== */
#bossToast{position:fixed;top:25%;left:50%;transform:translate(-50%,-50%);z-index:90;font-family:var(--font-display);font-size:18px;color:var(--cream);font-style:italic;background:rgba(0,0,0,0.6);padding:8px 16px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity 0.3s ease}
#bossToast.show{opacity:1}

/* ===== MATCH FLASH ===== */
#matchFlash{position:fixed;inset:0;z-index:80;pointer-events:none;opacity:0;background:radial-gradient(ellipse 80% 50% at 50% 15%,rgba(255,255,220,0.95),rgba(244,200,66,0.6) 35%,rgba(244,200,66,0.15) 60%,transparent 80%)}
#matchFlash.flash{animation:matchFlash 0.8s ease-out forwards}

/* ===== ANIMATIONS ===== */
@keyframes matchFlash{0%{opacity:1}100%{opacity:0}}
@keyframes matchPop{0%{transform:scale(1);opacity:1;background:var(--gold);border-radius:50%}30%{transform:scale(1.5);opacity:1;background:var(--gold);border-radius:50%;box-shadow:0 0 18px var(--halo)}70%{transform:scale(1.3);opacity:0.6;background:var(--gold);border-radius:50%}100%{transform:scale(0);opacity:0;background:var(--gold);border-radius:50%}}
@keyframes invalidShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes hintPulse{0%,100%{box-shadow:0 0 0 0 var(--halo)}50%{box-shadow:0 0 0 6px var(--halo)}}
@keyframes objPulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes comboIn{0%{transform:translate(-50%,-50%) scale(0) rotate(-5deg);opacity:0}30%{transform:translate(-50%,-50%) scale(1.2) rotate(3deg);opacity:1}60%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1}100%{transform:translate(-50%,-50%) scale(0.9);opacity:0}}
@keyframes tutSwipe{0%{transform:translateX(-20px) rotate(-10deg)}50%{transform:translateX(20px) rotate(10deg)}100%{transform:translateX(-20px) rotate(-10deg)}}
@keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes prizeBounce{0%{transform:scale(0)}50%{transform:scale(1.15)}70%{transform:scale(0.95)}100%{transform:scale(1)}}
@keyframes ctaPulse{0%,100%{box-shadow:0 0 0 0 var(--halo)}50%{box-shadow:0 0 20px 4px var(--halo)}}
</style>
</head>
<body>
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <span class="topbar-pill" id="actLabel">ATTO 1</span>
    <span class="topbar-title"><img src="sister-act-logo-oriz.png" alt="Sister Act" class="topbar-logo" onerror="this.style.display='none';this.parentElement.textContent='Sister Match'"></span>

      <button id="btnMute" aria-label="Audio on/off">🔊</button>

  <!-- Intro Overlay -->
  <div class="overlay" id="introOverlay">

    <div class="prize-btns">
      <a href="https://sisteractmilano.it/premio?source=sister-match&score=0" class="btn btn-gold" id="btnPrize" style="animation:ctaPulse 2s ease infinite;width:100%">RISCATTA I BIGLIETTI</a>
      <button class="btn btn-outline" id="btnShare" style="width:100%">📲 Condividi con gli amici</button>

  <!-- Tutorial Overlay -->

</div>

<script>
/* ============================================================
   SISTER MATCH — Logica di gioco completa
   ============================================================ */

// ===== COSTANTI =====
const COLS = 7, ROWS = 8, CELL_TOTAL = COLS * ROWS;
const SYMBOLS = ['🎤','🙏','🕯️','📿','💿','💄'];
const COMBO_MSG = { 2: 'Amen!', 3: 'Halleluja!', 4: 'Miracolo!', 5: 'Divino!' };

// ===== DEFINIZIONE DEI 10 LIVELLI =====
const LEVELS = [
  { name:'Coro alle Prime Armi', moves:25, objs:[{s:'🎤',n:12},{s:'🙏',n:10}] },
  { name:'La Prima Lezione', moves:24, objs:[{s:'🎤',n:14},{s:'🕯️',n:10}] },
  { name:'Hallelujah!', moves:22, objs:[{s:'🎤',n:15},{s:'🕯️',n:12},{s:'📿',n:8}] },
  { name:'Le Voci si Alzano', moves:22, objs:[{s:'🙏',n:15},{s:'📿',n:12},{s:'💿',n:8}] },
  { name:'Che Favola!', moves:20, objs:[{s:'💿',n:18},{s:'💄',n:12},{s:'🎤',n:10}] },
  { name:'La Chiesa Si Riempie', moves:20, objs:[{s:'🕯️',n:16},{s:'🙏',n:14},{s:'📿',n:12}] },
  { name:'La Stampa Ne Parla', moves:19, objs:[{s:'🎤',n:18},{s:'💿',n:15},{s:'💄',n:10}] },
  { name:'Verso il Palcoscenico', moves:18, objs:[{s:'🎤',n:20},{s:'🙏',n:16},{s:'🕯️',n:14}] },
  { name:'La Notte Prima del Debutto', moves:25, objs:[{s:'🎤',n:10},{s:'🙏',n:10},{s:'🕯️',n:10},{s:'📿',n:10},{s:'💿',n:10},{s:'💄',n:10}] },
  { name:'Madre Superiora', moves:20, objs:[{s:'🎤',n:10},{s:'🙏',n:12},{s:'🕯️',n:8}], boss:true }
];

// ===== CUTSCENES (tono: divertente) =====
const CUTSCENES = [
  { act:'ATTO 2 DI 10', emoji:'🎵', title:'La Prima Lezione', text:'Suor Patrizia è entusiasta di te. Suor Lazzara è un osso duro. Continua a provare per convincerla!' },
  { act:'ATTO 3 DI 10', emoji:'🙏', title:'Hallelujah!', text:'Le preghiere si trasformano in canzoni. Il convento non ha mai sentito nulla del genere.' },
  { act:'ATTO 4 DI 10', emoji:'🎙️', title:'Le Voci si Alzano', text:'Sento che stai prendendo ritmo! Anche la Madre Superiora ha smesso di tapparsi le orecchie. È un buon segno, fidati.' },
  { act:'ATTO 5 DI 10', emoji:'💿', title:'Che Favola!', text:'Il tuo sound sta crescendo, non fermarti adesso!' },
  { act:'ATTO 6 DI 10', emoji:'🕯️', title:'La Chiesa Si Riempie', text:'La messa è sold out e il Monsignore balla. Tutto merito tuo. Ma il meglio deve ancora venire — continua!' },
  { act:'ATTO 7 DI 10', emoji:'📰', title:'La Stampa Ne Parla', text:'Sei finita sul giornale insieme al coro. Ora non puoi più fermarti — tutti ti stanno guardando!' },
  { act:'ATTO 8 DI 10', emoji:'🎭', title:'Verso il Palcoscenico', text:'Il debutto si avvicina e abbiamo bisogno di te al massimo. Allenati ancora!' },
  { act:'ATTO 9 DI 10', emoji:'🌙', title:'La Notte Prima del Debutto', text:'Domani è il grande giorno. Un\'ultima prova e poi si va in scena.' },
  { act:'ATTO 10 DI 10', emoji:'👩🏾‍✈️', title:'Madre Superiora', text:'Questo è il momento della verità. La Madre Superiora non si convince facilmente. Ma tu sei arrivata fin qui. Adesso vai e conquistala!' }
];

// ===== STATO DI GIOCO =====
let grid = [];           // griglia [row][col] = simbolo
let currentLevel = 0;
let movesLeft = 0;
let totalMoves = 0;
let objectives = [];     // [{symbol, needed, collected}]
let totalScore = 0;
let levelScore = 0;
let comboCount = 0;
let isProcessing = false;
let selectedCell = null;  // {row, col}
let bossPatience = 0;
let bossMaxPatience = 20;
let bossMoveCount = 0;
let audioMuted = false;
let audio = null;

// ===== DOM =====
const $ = id => document.getElementById(id);
const gridEl = $('grid');
const hudObjs = $('hudObjs');
const hudMoves = $('hudMoves');
const actLabel = $('actLabel');
const bossHud = $('bossHud');
const bossBar = $('bossBar');
const bossLabel = $('bossLabel');
const bossGridOverlay = $('bossGridOverlay');
const bossBorder = $('bossBorder');
const introOverlay = $('introOverlay');
const cutsceneOverlay = $('cutsceneOverlay');
const endOverlay = $('endOverlay');
const prizeOverlay = $('prizeOverlay');
const tutorialOverlay = $('tutorialOverlay');

// ===== INIZIALIZZAZIONE =====
function init() {
  audio = $('bgAudio');
  audio.volume = 0.45;

  // Carica stato mute da localStorage
  const savedMuted = localStorage.getItem('sm_muted');
  if (savedMuted === '1') {
    audioMuted = true;
    audio.muted = true;
    $('btnMute').textContent = '🔇';
    $('btnMute').classList.add('muted');
  }

  // Carica progresso
  const maxLevel = parseInt(localStorage.getItem('sm_max_level') || '0');
  const bestScore = parseInt(localStorage.getItem('sm_best_score') || '0');
  totalScore = bestScore;

  if (maxLevel > 0) {
    $('resumeRow').style.display = 'flex';
    $('resumeLvl').textContent = maxLevel + 1;
    $('btnResume').onclick = () => {
      currentLevel = maxLevel;
      introOverlay.classList.add('hidden');
      document.querySelector('.footer').classList.add('visible');
      startLevel(currentLevel);
    };
    $('btnRestartAll').onclick = () => {
      localStorage.setItem('sm_max_level', '0');
      localStorage.setItem('sm_best_score', '0');
      totalScore = 0;
      $('resumeRow').style.display = 'none';
    };
  }

  // Preview obiettivi livello 1
  setPreviewObjs(0);

  // Bottone start
  $('btnStart').onclick = () => {
    introOverlay.classList.add('hidden');
    document.querySelector('.footer').classList.add('visible');
    playAudio();
    startLevel(currentLevel);
    // Mostra tutorial al primo gioco, sparisce dopo 5 secondi
    if (currentLevel === 0 && localStorage.getItem('sm_tutorial_done') !== '1') {
      tutorialOverlay.style.display = 'flex';
      setTimeout(() => {
        tutorialOverlay.style.display = 'none';
        localStorage.setItem('sm_tutorial_done', '1');
      }, 5000);
    }
  };

  // Bottone mute
  $('btnMute').onclick = toggleMute;

  // Bottone restart livello
  $('btnRestart').onclick = () => {
    startLevel(currentLevel);
  };

  // Bottone avanti cutscene
  $('btnNext').onclick = () => {
    cutsceneOverlay.classList.add('hidden');
    startLevel(currentLevel);
  };

  // Input griglia
  setupGridInput();
}

function setPreviewObjs(lvl) {
  const el = $('previewObjs');
  el.innerHTML = '';
  LEVELS[lvl].objs.forEach(o => {
    const span = document.createElement('span');
    span.textContent = o.s + '×' + o.n;
    el.appendChild(span);
  });
}

// ===== AUDIO =====
function playAudio() {
  if (audio && audio.paused) {
    audio.play().catch(() => {});
  }
}

function toggleMute() {
  audioMuted = !audioMuted;
  audio.muted = audioMuted;
  $('btnMute').textContent = audioMuted ? '🔇' : '🔊';
  $('btnMute').classList.toggle('muted', audioMuted);
  localStorage.setItem('sm_muted', audioMuted ? '1' : '0');
}

// ===== GENERAZIONE GRIGLIA =====
function generateGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = randomSymbol(r, c);
    }
  }
  // Verifica che ci siano mosse possibili, altrimenti rigenera
  if (!hasValidMoves()) generateGrid();
}

function randomSymbol(row, col) {
  // Evita match-3 alla generazione
  let sym;
  let attempts = 0;
  do {
    sym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
    attempts++;
    if (attempts > 50) break; // sicurezza
  } while (
    attempts < 50 &&
    ((col >= 2 && grid[row][col-1] === sym && grid[row][col-2] === sym) ||
     (row >= 2 && grid[row-1] && grid[row-1][col] === sym && grid[row-2] && grid[row-2][col] === sym))
  );
  return sym;
}

// ===== RENDERING SIMBOLO =====
function renderSymbol(sym) {
  return sym; // Centralizzata per futura sostituzione con <img>
}

// ===== RENDERING GRIGLIA =====
function renderGrid() {
  // Rimuovi celle esistenti ma non overlay/border
  const cells = gridEl.querySelectorAll('.grid-cell');
  cells.forEach(c => c.remove());

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.textContent = renderSymbol(grid[r][c]);
      gridEl.appendChild(cell);
    }
  }
}

function updateCell(r, c) {
  const cell = getCellEl(r, c);
  if (cell) cell.textContent = renderSymbol(grid[r][c]);
}

function getCellEl(r, c) {
  return gridEl.querySelector(`.grid-cell[data-row="${r}"][data-col="${c}"]`);
}

// ===== INPUT GRIGLIA (Pointer Events) =====
let pointerStart = null;
let pointerCell = null;
let pointerMoved = false;

function setupGridInput() {
  gridEl.addEventListener('pointerdown', onPointerDown, { passive: false });
  gridEl.addEventListener('pointermove', onPointerMove, { passive: false });
  gridEl.addEventListener('pointerup', onPointerUp, { passive: false });
  gridEl.addEventListener('pointercancel', onPointerUp, { passive: false });
}

function onPointerDown(e) {
  if (isProcessing) return;
  e.preventDefault();
  const cell = e.target.closest('.grid-cell');
  if (!cell) return;
  const r = parseInt(cell.dataset.row);
  const c = parseInt(cell.dataset.col);
  pointerStart = { x: e.clientX, y: e.clientY };
  pointerCell = { row: r, col: c };
  pointerMoved = false;
}

function onPointerMove(e) {
  if (!pointerStart || isProcessing) return;
  e.preventDefault();
  const dx = e.clientX - pointerStart.x;
  const dy = e.clientY - pointerStart.y;
  const threshold = 30;

  if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
    pointerMoved = true;
    let dr = 0, dc = 0;
    if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1;
    else dr = dy > 0 ? 1 : -1;

    const tr = pointerCell.row + dr;
    const tc = pointerCell.col + dc;
    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
      clearSelection();
      pointerStart = null;
      attemptSwap(pointerCell.row, pointerCell.col, tr, tc);
    }
  }
}

function onPointerUp(e) {
  if (!pointerMoved && pointerCell && !isProcessing) {
    // Singolo tap — seleziona/deseleziona cella
    const r = pointerCell.row;
    const c = pointerCell.col;
    const cell = getCellEl(r, c);
    if (!selectedCell) {
      selectedCell = { row: r, col: c };
      if (cell) cell.classList.add('selected');
    } else {
      const dr = Math.abs(selectedCell.row - r);
      const dc = Math.abs(selectedCell.col - c);
      if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
        const sr = selectedCell.row, sc = selectedCell.col;
        clearSelection();
        attemptSwap(sr, sc, r, c);
      } else if (selectedCell.row === r && selectedCell.col === c) {
        clearSelection();
      } else {
        clearSelection();
        selectedCell = { row: r, col: c };
        if (cell) cell.classList.add('selected');
      }
    }
  }
  pointerStart = null;
  pointerCell = null;
  pointerMoved = false;
}

function clearSelection() {
  if (selectedCell) {
    const el = getCellEl(selectedCell.row, selectedCell.col);
    if (el) el.classList.remove('selected');
    selectedCell = null;
  }
}

// ===== SWAP =====
async function attemptSwap(r1, c1, r2, c2) {
  if (isProcessing) return;
  isProcessing = true;

  // Swap visivo + dati
  const sym1 = grid[r1][c1];
  const sym2 = grid[r2][c2];
  grid[r1][c1] = sym2;
  grid[r2][c2] = sym1;

  // Animazione swap
  const el1 = getCellEl(r1, c1);
  const el2 = getCellEl(r2, c2);
  if (el1) { el1.textContent = renderSymbol(sym2); el1.classList.add('swapping'); }
  if (el2) { el2.textContent = renderSymbol(sym1); el2.classList.add('swapping'); }

  await wait(200);
  if (el1) el1.classList.remove('swapping');
  if (el2) el2.classList.remove('swapping');

  // Controlla match
  const matches = findMatches();
  if (matches.length === 0) {
    // Swap indietro
    grid[r1][c1] = sym1;
    grid[r2][c2] = sym2;
    updateCell(r1, c1);
    updateCell(r2, c2);
    if (el1) el1.classList.add('invalid-swap');
    if (el2) el2.classList.add('invalid-swap');
    await wait(300);
    if (el1) el1.classList.remove('invalid-swap');
    if (el2) el2.classList.remove('invalid-swap');
    isProcessing = false;
    return;
  }

  // Mosse — solo per swap valido
  movesLeft--;
  levelScore += 10;
  updateHUD();

  // Boss: decrementa pazienza
  if (isBossLevel()) {
    bossMoveCount++;
    bossPatience = Math.max(0, bossPatience - 1);
    updateBossHUD();
    if (bossMoveCount % 5 === 0) showBossToast('La Madre Superiora ti scruta...');
  }

  // Processa match e cascate
  comboCount = 0;
  await processMatches();

  // Dopo tutto il processing, controlla stato
  checkLevelEnd();
  isProcessing = false;
}

// ===== MATCH FINDING =====
function findMatches() {
  const matched = new Set();

  // Righe orizzontali
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const s = grid[r][c];
      if (s && s === grid[r][c+1] && s === grid[r][c+2]) {
        let end = c + 2;
        while (end + 1 < COLS && grid[r][end+1] === s) end++;
        for (let i = c; i <= end; i++) matched.add(r * COLS + i);
      }
    }
  }

  // Righe verticali
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const s = grid[r][c];
      if (s && s === grid[r+1][c] && s === grid[r+2][c]) {
        let end = r + 2;
        while (end + 1 < ROWS && grid[end+1][c] === s) end++;
        for (let i = r; i <= end; i++) matched.add(i * COLS + c);
      }
    }
  }

  return Array.from(matched).map(idx => ({ row: Math.floor(idx / COLS), col: idx % COLS, symbol: grid[Math.floor(idx / COLS)][idx % COLS] }));
}

// ===== PROCESSA MATCH E CASCATE =====
async function processMatches() {
  let matches = findMatches();
  while (matches.length > 0) {
    comboCount++;

    // Aggiorna obiettivi
    matches.forEach(m => {
      const obj = objectives.find(o => o.symbol === m.symbol);
      if (obj && obj.collected < obj.needed) {
        obj.collected++;
      }
      // Boss: 🙏 riempie pazienza
      if (isBossLevel() && m.symbol === '🙏') {
        bossPatience = Math.min(bossMaxPatience, bossPatience + 2);
      }
    });

    // Punteggio combo
    const multiplier = comboCount;
    levelScore += matches.length * 10 * multiplier;

    // Mostra toast combo
    if (comboCount >= 2) {
      const msg = COMBO_MSG[Math.min(comboCount, 5)];
      showComboToast(msg);
    }

    // Animazione rimozione
    matches.forEach(m => {
      const el = getCellEl(m.row, m.col);
      if (el) el.classList.add('matched');
    });
    playMatchSfx();
    flashMatch();
    await wait(450);

    // Rimuovi simboli
    matches.forEach(m => { grid[m.row][m.col] = null; });

    // Gravità
    await applyGravity();

    // Riempi celle vuote in cima
    fillEmptyTop();

    // Re-render
    renderGrid();
    updateHUD();
    if (isBossLevel()) updateBossHUD();

    await wait(200);

    // Cerca nuovi match
    matches = findMatches();
  }

  // Verifica mosse possibili, altrimenti shuffle
  if (!hasValidMoves()) {
    silentShuffle();
    renderGrid();
  }
}

// ===== GRAVITÀ =====
async function applyGravity() {
  let moved = false;
  for (let c = 0; c < COLS; c++) {
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] !== null) {
        if (r !== writeRow) {
          grid[writeRow][c] = grid[r][c];
          grid[r][c] = null;
          moved = true;
        }
        writeRow--;
      }
    }
  }
  if (moved) await wait(150);
}

// ===== RIEMPI CELLE VUOTE IN CIMA =====
function fillEmptyTop() {
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      if (grid[r][c] === null) {
        grid[r][c] = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
      }
    }
  }
}

// ===== MOSSE VALIDE =====
function hasValidMoves() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // Prova swap a destra
      if (c < COLS - 1) {
        swapData(r, c, r, c+1);
        if (findMatches().length > 0) { swapData(r, c, r, c+1); return true; }
        swapData(r, c, r, c+1);
      }
      // Prova swap sotto
      if (r < ROWS - 1) {
        swapData(r, c, r+1, c);
        if (findMatches().length > 0) { swapData(r, c, r+1, c); return true; }
        swapData(r, c, r+1, c);
      }
    }
  }
  return false;
}

function swapData(r1, c1, r2, c2) {
  const tmp = grid[r1][c1];
  grid[r1][c1] = grid[r2][c2];
  grid[r2][c2] = tmp;
}

// ===== SHUFFLE SILENZIOSO =====
function silentShuffle() {
  let flat = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      flat.push(grid[r][c]);

  // Fisher-Yates
  for (let i = flat.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [flat[i], flat[j]] = [flat[j], flat[i]];
  }

  let idx = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      grid[r][c] = flat[idx++];

  // Se dopo lo shuffle non ci sono mosse o ci sono match, rigenera
  if (findMatches().length > 0 || !hasValidMoves()) {
    generateGrid();
  }
}

// ===== BOSS =====
function isBossLevel() {
  return LEVELS[currentLevel] && LEVELS[currentLevel].boss === true;
}

function updateBossHUD() {
  if (!isBossLevel()) return;
  const pct = (bossPatience / bossMaxPatience) * 100;
  bossBar.style.width = pct + '%';
  bossLabel.textContent = bossPatience;

  // Bordo rosso se pazienza bassa
  if (pct < 30) {
    bossBorder.style.borderColor = 'var(--red)';
    bossBorder.style.animation = 'hintPulse 1s ease infinite';
  } else {
    bossBorder.style.borderColor = 'transparent';
    bossBorder.style.animation = 'none';
  }
}

function showBossToast(msg) {
  const el = $('bossToast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ===== MATCH FLASH =====
function flashMatch() {
  const el = $('matchFlash');
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

// ===== TOAST COMBO =====
function showComboToast(msg) {
  const el = $('comboToast');
  el.textContent = msg;
  el.classList.remove('show');
  void el.offsetWidth; // force reflow
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1000);
}

// ===== HUD =====
function updateHUD() {
  hudMoves.textContent = movesLeft;
  hudObjs.innerHTML = '';
  objectives.forEach(o => {
    const div = document.createElement('div');
    div.className = 'obj-item' + (o.collected >= o.needed ? ' done' : '');
    div.innerHTML = '<span class="obj-sym">' + renderSymbol(o.symbol) + '</span><span>' + Math.min(o.collected, o.needed) + '/' + o.needed + '</span>';
    hudObjs.appendChild(div);
  });
  actLabel.textContent = 'ATTO ' + (currentLevel + 1);
}

// ===== INIZIO LIVELLO =====
function startLevel(lvl) {
  currentLevel = lvl;
  const level = LEVELS[lvl];
  movesLeft = level.moves;
  totalMoves = level.moves;
  levelScore = 0;
  comboCount = 0;
  objectives = level.objs.map(o => ({ symbol: o.s, needed: o.n, collected: 0 }));
  selectedCell = null;
  isProcessing = false;

  // Boss setup
  if (level.boss) {
    bossPatience = 20;
    bossMaxPatience = 20;
    bossMoveCount = 0;
    bossHud.style.display = 'flex';
    bossGridOverlay.style.display = 'block';
    updateBossHUD();
  } else {
    bossHud.style.display = 'none';
    bossGridOverlay.style.display = 'none';
    bossBorder.style.borderColor = 'transparent';
    bossBorder.style.animation = 'none';
  }

  generateGrid();
  renderGrid();
  updateHUD();
}

// ===== CHECK FINE LIVELLO =====
function checkLevelEnd() {
  // Boss: pazienza a zero
  if (isBossLevel() && bossPatience <= 0) {
    showEndScreen(false, 'La Madre Superiora ha perso fiducia. Riprova, Sister!');
    return;
  }

  // Mosse esaurite
  if (movesLeft <= 0) {
    const allDone = objectives.every(o => o.collected >= o.needed);
    if (allDone) {
      showEndScreen(true);
    } else {
      showEndScreen(false, 'Sister, riprova! Ci crediamo in te!');
    }
    return;
  }

  // Obiettivi completati con mosse ancora disponibili
  const allDone = objectives.every(o => o.collected >= o.needed);
  if (allDone) {
    showEndScreen(true);
  }
}

// ===== SCHERMATA FINE LIVELLO =====
function showEndScreen(won, loseMsg) {
  if (won) {
    // Calcola stelle
    const movePct = movesLeft / totalMoves;
    let stars = 1;
    if (movePct >= 0.40) stars = 3;
    else if (movePct >= 0.15) stars = 2;

    // Bonus fine livello
    const bonus = movesLeft * 100 + stars * 500;
    levelScore += bonus;
    totalScore += levelScore;

    // Salva progresso
    if (currentLevel + 1 > parseInt(localStorage.getItem('sm_max_level') || '0')) {
      localStorage.setItem('sm_max_level', String(currentLevel + 1));
    }
    if (totalScore > parseInt(localStorage.getItem('sm_best_score') || '0')) {
      localStorage.setItem('sm_best_score', String(totalScore));
    }

    $('endTitle').textContent = 'Halleluja!';
    $('endTitle').style.color = 'var(--gold)';
    $('endSub').textContent = 'Livello superato!';
    $('endStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
    $('endScore').textContent = levelScore + ' punti';

    $('endBtns').innerHTML = '';
    // Condividi
    const shareBtn = document.createElement('button');
    shareBtn.className = 'btn btn-outline';
    shareBtn.textContent = 'Condividi';
    shareBtn.onclick = () => shareResult(levelScore);
    $('endBtns').appendChild(shareBtn);

    // Prossimo livello o premio
    if (currentLevel < 9) {
      const nextBtn = document.createElement('button');
      nextBtn.className = 'btn btn-gold';
      nextBtn.textContent = 'Avanti';
      nextBtn.onclick = () => {
        endOverlay.classList.add('hidden');
        showCutscene(currentLevel);
      };
      $('endBtns').appendChild(nextBtn);
    } else {
      // Livello 10 vinto → premio
      const prizeBtn = document.createElement('button');
      prizeBtn.className = 'btn btn-gold';
      prizeBtn.textContent = 'Riscatta il premio!';
      prizeBtn.onclick = () => {
        endOverlay.classList.add('hidden');
        showPrizeScreen();
      };
      $('endBtns').appendChild(prizeBtn);
    }

    playWinSfx();
  } else {
    $('endTitle').textContent = 'Oh no!';
    $('endTitle').style.color = 'var(--red)';
    $('endSub').textContent = loseMsg || 'Sister, riprova!';
    $('endStars').textContent = '';
    $('endScore').textContent = '';

    $('endBtns').innerHTML = '';
    const retryBtn = document.createElement('button');
    retryBtn.className = 'btn btn-red';
    retryBtn.textContent = 'Riprova';
    retryBtn.onclick = () => {
      endOverlay.classList.add('hidden');
      startLevel(currentLevel);
    };
    $('endBtns').appendChild(retryBtn);
  }

  endOverlay.classList.remove('hidden');
}

// ===== CUTSCENE =====
function showCutscene(completedLevel) {
  const scene = CUTSCENES[completedLevel];
  if (!scene) { currentLevel++; startLevel(currentLevel); return; }

  currentLevel++;
  $('cutAct').textContent = scene.act;
  $('cutEmoji').textContent = scene.emoji;
  $('cutTitle').textContent = scene.title;
  $('cutText').textContent = scene.text;
  cutsceneOverlay.classList.remove('hidden');
}

// ===== SCHERMATA PREMIO =====
function showPrizeScreen() {
  $('btnPrize').href = 'https://sisteractmilano.it/premio?source=sister-match&score=' + totalScore;
  $('btnShare').onclick = () => shareResult(totalScore);
  prizeOverlay.classList.remove('hidden');

  // Alza volume in questa schermata
  audio.volume = 0.7;

  // Coriandoli
  spawnConfetti();
}

// ===== CORIANDOLI =====
function spawnConfetti() {
  const colors = ['#d8232a','#f4c842','#fff5e1','#b8891f','#8a0e14'];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 3) + 's';
    c.style.animationDelay = Math.random() * 2 + 's';
    c.style.width = (6 + Math.random() * 6) + 'px';
    c.style.height = (8 + Math.random() * 10) + 'px';
    prizeOverlay.appendChild(c);
  }
  setTimeout(() => {
    prizeOverlay.querySelectorAll('.confetti').forEach(c => c.remove());
  }, 7000);
}

// ===== CONDIVISIONE =====
function shareResult(score) {
  const text = 'Ho fatto ' + score + ' punti a Sister Match! \uD83C\uDFA4\u2728 Sister Act il Musical, al Teatro Nazionale di Milano da ottobre. #SisterActMilano';
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: 'Sister Match', text: text, url: url }).catch(() => {});
  } else {
    window.open('https://wa.me/?text=' + encodeURIComponent(text + ' ' + url), '_blank');
  }
}

// ===== EFFETTI SONORI (Web Audio API) =====
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  return audioCtx;
}

function playMatchSfx() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function playWinSfx() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.12);
      gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.3);
    });
  } catch(e) {}
}

// ===== UTILITY =====
function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ===== AVVIO =====
document.addEventListener('DOMContentLoaded', init);
